<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,'Malgun Gothic',sans-serif;background:#1f2733;color:#e7edf4}
#lk{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.box{background:#28323f;border:1px solid #3a4757;border-radius:16px;padding:34px 30px;width:340px;max-width:92vw;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.box h1{font-size:18px;margin:0 0 6px}

.box input{width:100%;padding:11px 13px;border-radius:9px;border:1px solid #44536a;background:#161d27;color:#fff;font-size:14px;font-family:inherit}
.box input:focus{outline:none;border-color:#4a90d9}

.box button:hover{background:#2569c9}
#err{display:none;color:#ff8f8f;font-size:12.5px;margin-top:12px}
.lock-ico{font-size:34px;margin-bottom:10px}
</style></head><body>

function b2a(b64){var bin=atob(b64),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;}
async function dk(pw){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(D.s),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function dec(pw){
  try{
    var key=await dk(pw);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(D.i)},key,b2a(D.c));
    var html=new TextDecoder().decode(pt);
    try{sessionStorage.setItem(SK,pw);}catch(e){}
    document.open();document.write(html);document.close();
    return true;
  }catch(e){return false;}
}
function go(){var er=document.getElementById('err');er.style.display='none';
  dec(document.getElementById('pw').value).then(function(ok){if(!ok){er.style.display='';try{sessionStorage.removeItem(SK);}catch(e){}}});}
(async function(){
  var pw=null;try{pw=sessionStorage.getItem(SK);}catch(e){}
  if(pw&&await dec(pw))return;
  document.getElementById('lk').style.display='flex';
  var el=document.getElementById('pw');if(el)el.focus();
})();
